name: Docker Build & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Pushes performed by GITHUB_TOKEN (e.g. trusted-automerge merging a PR)
  # do not trigger downstream workflows, so the on:push trigger silently
  # no-ops for auto-merged PRs. Chain off the automerge workflow's
  # completion to cover that case. We still gate on success below so a
  # failed automerge run doesn't produce a build.
  workflow_run:
    workflows: ["Trusted PR Auto-Approve and Merge"]
    types: [completed]
    branches: [main]
  # Manual escape hatch for any other case where :latest needs rebuilding.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Skip workflow_run firings where the upstream automerge failed (e.g.
    # PR not by a trusted author — automerge no-ops or errors). Other event
    # types are always allowed; the per-step push gate decides what gets
    # uploaded.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Push for: direct main pushes, manual dispatch, and automerge-chained
        # runs. PRs build but don't push.
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'workflow_run'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .appcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: >-
            ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
                github.event_name == 'workflow_dispatch' ||
                github.event_name == 'workflow_run' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}-base:latest
            type=gha
          cache-to: type=gha,mode=max

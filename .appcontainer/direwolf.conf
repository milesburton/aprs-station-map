ADEVICE $AUDIO_DEVICE

CHANNEL 0
MYCALL $STATION_CALLSIGN
MODEM 1200

# Beacon to APRS-IS internet (requires IGSERVER/IGLOGIN added below by start-direwolf.sh)
PBEACON sendto=IG delay=0:30 every=30:00 symbol="igate" overlay=R lat=$STATION_LATITUDE long=$STATION_LONGITUDE comment="APRS IGate & RX"

KISSPORT 8001

# Gate received RF packets to APRS-IS (range filter 500km)
IGFILTER 0 m/500

LOGDIR /app/data/logs

# Enable error correction to improve decoding
FIX_BITS 1

# Production Docker Compose Configuration
# For development, use: docker compose -f compose.dev.yaml up

services:
  aprs-map:
    build:
      context: ..
      dockerfile: .appcontainer/Dockerfile
    container_name: aprs-station-map
    network_mode: host  # Bypass Docker networking - nginx on :80, backend on :3001
    volumes:
      - aprs-data:/app/data
    devices:
      - /dev/snd:/dev/snd
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - KISS_HOST=${KISS_HOST:-127.0.0.1}
      - KISS_PORT=${KISS_PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  aprs-data:

# Production Docker Compose Configuration
# For development, use: docker compose -f compose.dev.yaml up

services:
  aprs-map:
    image: ghcr.io/milesburton/aprs-station-map:latest
    container_name: aprs-station-map
    network_mode: host  # Bypass Docker networking - nginx on :80, backend on :3001
    volumes:
      - aprs-data:/app/data
    devices:
      - /dev/snd:/dev/snd
      - /dev/bus/usb:/dev/bus/usb
    environment:
      # DATA_SOURCE sets the single-source default ('kiss' or 'aprs-is').
      # KISS_ENABLED / APRS_IS_ENABLED / APRS_IS_FILTER come in via env_file
      # below — do NOT declare them here, because Compose substitution does
      # not see env_file values, so `KEY=${KEY:-}` would resolve to an empty
      # string at parse time and override whatever env_file loaded. Set them
      # in .env for the host operator's chosen ingestion mode.
      - DATA_SOURCE=${DATA_SOURCE:-kiss}
      - KISS_HOST=${KISS_HOST:-127.0.0.1}
      - KISS_PORT=${KISS_PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # Polls the registry every 5 min and pulls newer :latest images. Watches
  # every container on this host, but in practice that's just aprs-map.
  # CLEANUP=true reaps superseded image layers so the SD card doesn't fill.
  #
  # Using nickfedor/watchtower (active maintained fork) because the original
  # containrrr/watchtower repo was archived Dec 2025 and its image bitrotted —
  # ships a Docker SDK too old to talk to modern Docker Engine (≥25.0). Tag is
  # pinned so the auto-updater itself doesn't surprise-update.
  watchtower:
    image: nickfedor/watchtower:1.17.1
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true

volumes:
  aprs-data:

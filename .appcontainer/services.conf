[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:direwolf]
command=/app/start-direwolf.sh
directory=/app
autostart=true
autorestart=unexpected
exitcodes=0
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

[program:watchdog]
command=/app/watchdog.sh
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=99

[program:backend]
command=sh -c "node --max-old-space-size=${NODE_MAX_OLD_SPACE_MB:-150} dist-server/index.js"
directory=/app
user=node
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
; Only image-fixed values live here. Operator-controlled settings
; (DATA_SOURCE, KISS_ENABLED, APRS_IS_ENABLED, APRS_IS_FILTER, etc.) flow in
; from the container env via supervisord's default env inheritance — putting
; them here would silently override anything compose / .env passes in.
environment=DATABASE_PATH="/app/data/stations.db",NODE_ENV="production",APRS_IS_PORT="14580",AIS_SOURCE="none"
priority=20

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30
